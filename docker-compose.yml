services:
  # SQL Server Database
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: watchlist-sqlserver
    environment:
      SA_PASSWORD: "Alexandru20"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Express"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    networks:
      - watchlist-network
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'Alexandru20' -Q 'SELECT 1' -b"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: watchlist-backend
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: "http://+:5000"
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=WatchlistTrackerDb;User Id=sa;Password=Alexandru20;Encrypt=false;TrustServerCertificate=true;"
      Jwt__Key: "OLlN5YJ3wQ2t0v92BXqs4wGrd2jgepryKkRVIDt1KEH"
      Jwt__Issuer: "WatchlistTracker"
      Jwt__Audience: "WatchlistTrackerUsers"
    ports:
      - "5000:5000"
    depends_on:
      - sqlserver
    networks:
      - watchlist-network
    restart: unless-stopped

  # Frontend
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: watchlist-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - watchlist-network
    restart: unless-stopped

networks:
  watchlist-network:
    driver: bridge

volumes:
  sqlserver-data:
    driver: local
