name: student-${USER:-CHANGE_ME}

services:
  # SQL Server Database
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: student-${USER:-CHANGE_ME}-db
    environment:
      SA_PASSWORD: "${SQL_SA_PASSWORD}"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Express"
    expose:
      - "1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    networks:
      - studlab_net
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P '${SQL_SA_PASSWORD}' -Q 'SELECT 1' -b"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: student-${USER:-CHANGE_ME}-api
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__DefaultConnection: "Server=student-${USER:-CHANGE_ME}-db,1433;Database=${DB_NAME};User Id=sa;Password=${SQL_SA_PASSWORD};Encrypt=false;TrustServerCertificate=true;"
      Jwt__Key: "${JWT_KEY}"
      Jwt__Issuer: "${JWT_ISSUER}"
      Jwt__Audience: "${JWT_AUDIENCE}"
      SeedAdmin__Email: "${SEED_ADMIN_EMAIL}"
      SeedAdmin__Password: "${SEED_ADMIN_PASSWORD}"
    expose:
      - "8080"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - studlab_net
    restart: unless-stopped

  # Frontend
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: student-${USER:-CHANGE_ME}-frontend
    expose:
      - "80"
    depends_on:
      - api
    networks:
      - studlab_net
    restart: unless-stopped

networks:
  studlab_net:
    external: true

volumes:
  sqlserver-data:
    driver: local
